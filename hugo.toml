baseURL = 'https://blog.nextorange.top/'
languageCode = 'en-us'
title = 'XCZDEV Tech Portfolio | QA & DevOps'
theme = 'blowfish' # e.g., "blowfish" or "paper"

# Highlighting settings for articles
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "dracula" # Modern, dark-mode friendly highlighting

# Multi-language configuration
[languages]
  [languages.en]
    languageName = 'English'
    contentDir = 'content/en'
    weight = 1
    [languages.en.params]
      description = "QA & DevOps Engineering Blog"

  [languages.cn]
    languageName = '中文'
    contentDir = 'content/cn'
    weight = 2
    [languages.cn.params]
      description = "XCZ QA DevOps 博客"

# Menu configuration (appears in your header)
[[menu.main]]
  name = 'Articles'
  url = '/posts/'
  weight = 10

[[menu.main]]
  name = 'About'
  url = '/about/'
  weight = 20

[markup]
  [markup.highlight]
    noClasses = false # Blowfish uses CSS classes for highlighting
    codeFences = true
    guessSyntax = true
    lineNos = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[params]
  # Modern features for Blowfish
  colorScheme = "blues" # Or "ocean", "forest", "fire"
  defaultAppearance = "dark" # Very popular for tech sites
  showCodeCopyButton = true
  
  # This enables the "on the side" Table of Contents for your tech articles
  [params.article]
    showTableOfContents = true
    showRelatedPosts = true